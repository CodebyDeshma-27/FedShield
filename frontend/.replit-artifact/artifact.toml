kind = "web"
previewPath = "/"
title = "FedShield Dashboard"
version = "1.0.0"
id = "artifacts/fedshield"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21869

[services.development]
run = "pnpm --filter @workspace/fedshield run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fedshield", "run", "build" ]
publicDir = "artifacts/fedshield/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21869"
BASE_PATH = "/"
